        <div class="box d-flex justify-content-center align-items-center">
            <div class="envelope-content animate__animated animate__fadeIn">
                <h1>ESTE MENSAJE DE PARTE DE: <span id="senderName"></span></h1>
                <h1>para <span id="recipientName"></span>.</h1>
                <span id="message"></span></p>
                <div class="image-container" id="audio-container">
                    <!-- El reproductor de audio se agregará aquí -->
                </div>
                <a href="index.html">¿Quieres responder?</a>
            </div>
        </div>
    </section>


    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const senderName = urlParams.get('senderName');
        const recipientName = urlParams.get('recipientName');
        const message = urlParams.get('message');
        const soundcloudTrack = urlParams.get('soundcloudTrack');

        document.getElementById('senderName').textContent = senderName;
        document.getElementById('recipientName').textContent = recipientName;
        document.getElementById('message').textContent = message;

        if (soundcloudTrack && soundcloudTrack.trim() !== '') {
            const audioContainer = document.getElementById('audio-container');
            const audioPlayer = document.createElement('iframe');
            audioPlayer.src = `https://w.soundcloud.com/player/?url=${soundcloudTrack}&color=%23ff5500&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false`;
            audioPlayer.width = '100%';
            audioPlayer.height = '150'; // Cambiar este valor para ajustar la altura del reproductor
            audioPlayer.scrolling = 'no';
            audioPlayer.frameborder = 'no';
            audioPlayer.allow = 'autoplay';
            audioContainer.appendChild(audioPlayer);
        }

       
    </script>
